---
- name: Create app directories
  file:
    path: "{{ item }}"
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: '0755'
  with_items:
    - "/app/data"
    - "/app/vectorstore"

- name: Configure AWS CLI
  block:
    - name: Install AWS CLI
      apt:
        name: awscli
        state: present
    
    - name: Configure AWS credentials
      become: yes
      become_user: ubuntu
      shell: |
        aws configure set aws_access_key_id "{{ aws_access_key }}"
        aws configure set aws_secret_access_key "{{ aws_secret_key }}"
        aws configure set region "{{ aws_region }}"
        aws configure set output json

- name: Login to ECR
  become: yes
  become_user: ubuntu
  shell: |
    aws ecr get-login-password --region {{ aws_region }} | docker login --username AWS --password-stdin {{ ecr_registry }}
  args:
    executable: /bin/bash

- name: Set up environment variables file
  template:
    src: env.j2
    dest: /home/ubuntu/.env
    owner: ubuntu
    group: ubuntu
    mode: '0600'

- name: Pull latest container
  become: yes
  become_user: ubuntu
  shell: |
    docker pull {{ ecr_registry }}/backend:latest
  args:
    executable: /bin/bash

- name: Create Docker container run script
  template:
    src: run-container.sh.j2
    dest: /home/ubuntu/run-container.sh
    owner: ubuntu
    group: ubuntu
    mode: '0755'

- name: Run the container
  become: yes
  become_user: ubuntu
  shell: /home/ubuntu/run-container.sh
  args:
    executable: /bin/bash
